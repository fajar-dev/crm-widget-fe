  /api/chat/{tenantSlug}/sessions/{token}:
    get:
      summary: Get session by token
      tags: [Public Chat]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Session token
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionResponse'
        '404':
          description: Session not found or expired

  /api/chat/{tenantSlug}/conversations:
    post:
      summary: Start a new conversation
      tags: [Public Chat]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '201':
          description: Conversation started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ConversationResponse'
        '401':
          description: Invalid or missing session token
        '404':
          description: Tenant not found

  /api/chat/{tenantSlug}/conversations/{convId}/messages:
    post:
      summary: Send a message in a conversation
      tags: [Public Chat]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - name: convId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation UUID
        - $ref: '#/components/parameters/SessionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message sent and AI response received
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChatResponse'
        '401':
          description: Invalid or missing session token
        '404':
          description: Conversation not found
        '422':
          description: Validation error

  /api/chat/{tenantSlug}/conversations/{convId}/end:
    post:
      summary: End a conversation
      tags: [Public Chat]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - name: convId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation UUID
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Conversation ended
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ConversationResponse'
        '401':
          description: Invalid or missing session token
        '404':
          description: Conversation not found
