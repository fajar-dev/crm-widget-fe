openapi: '3.1.0'
info:
  title: CRM Multi-Tenant API
  version: '0.4.0'
  description: |
    Multi-tenant CRM API built with Hono, TypeORM, and Zod.
    All API endpoints require an `X-Tenant-ID` header with a valid UUID.
    Protected endpoints require a `Bearer` JWT token in the `Authorization` header.
    Public chat endpoints use session-based auth via `X-Session-Token` header.

servers:
  - url: http://localhost:3000
    description: Local Development

tags:
  - name: System
    description: Health check and system endpoints
  - name: Auth
    description: Authentication and user management
  - name: Tenants
    description: Tenant CRUD and member management
  - name: Contacts
    description: Contact management
  - name: Widget Settings
    description: Chat widget appearance and behavior settings
  - name: Chatbot Settings
    description: AI chatbot model and parameter configuration
  - name: Form Fields
    description: Pre-chat form field configuration
  - name: Sessions
    description: Chat session management (admin)
  - name: Conversations
    description: Conversation and message management (admin)
  - name: Knowledge
    description: Knowledge base categories and entries
  - name: Public Chat
    description: Public-facing chat widget API (session-based)
  - name: Playground
    description: Authenticated chatbot playground for testing

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access token. Get one from POST /api/auth/login'

  parameters:
    TenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant UUID

    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

    TenantSlug:
      name: tenantSlug
      in: path
      required: true
      schema:
        type: string
      description: Tenant slug identifier

    SessionToken:
      name: X-Session-Token
      in: header
      required: true
      schema:
        type: string
      description: Session token for public chat authentication

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    PerPageParam:
      name: perPage
      in: query
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100

    SortByParam:
      name: sortBy
      in: query
      schema:
        type: string
        default: createdAt

    SortOrderParam:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [ASC, DESC]
        default: DESC

    SearchParam:
      name: search
      in: query
      schema:
        type: string

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        statusCode:
          type: integer
        message:
          type: string
        data:
          oneOf:
            - type: object
            - type: array
            - type: 'null'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        perPage:
          type: integer
        currentPage:
          type: integer
        lastPage:
          type: integer
        from:
          type: integer
        to:
          type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
        message:
          type: string
        data:
          type: 'null'
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    # Auth Schemas
    RegisterRequest:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          example: John
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          maxLength: 128
          example: SecurePass123!
        role:
          type: string
          enum: [super_admin, admin, manager, member]
          default: member

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: SecurePass123!

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: string
          example: '15m'

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [super_admin, admin, manager, member]
        isActive:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Tenant Schemas
    CreateTenantRequest:
      type: object
      required: [name, company, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: My Company
        company:
          type: string
          minLength: 1
          maxLength: 200
          example: My Company Inc
        slug:
          type: string
          minLength: 2
          maxLength: 100
          pattern: '^[a-z0-9-]+$'
          example: my-company

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        company:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 100
          pattern: '^[a-z0-9-]+$'

    TenantResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        company:
          type: string
        slug:
          type: string
        code:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    JoinTenantRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20

    AcceptInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1

    InviteMemberRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [super_admin, admin, manager, member]
          default: member

    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [super_admin, admin, manager, member]

    MemberResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [super_admin, admin, manager, member]
        user:
          $ref: '#/components/schemas/UserResponse'
        createdAt:
          type: string
          format: date-time

    # Contact Schemas
    CreateContactRequest:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          example: Jane
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          example: Smith
        email:
          type: string
          format: email
          example: jane@company.com
        phone:
          type: string
          maxLength: 50
          example: '+62812345678'
        company:
          type: string
          maxLength: 200
          example: Acme Corp
        jobTitle:
          type: string
          maxLength: 100
          example: Marketing Manager
        status:
          type: string
          enum: [lead, prospect, customer, inactive]
          default: lead
        source:
          type: string
          enum: [website, referral, social_media, cold_call, email, other]
          default: other
        notes:
          type: string
          example: Met at conference 2025
        address:
          type: string
          maxLength: 500
          example: 123 Main St, Jakarta

    UpdateContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        jobTitle:
          type: string
        status:
          type: string
          enum: [lead, prospect, customer, inactive]
        source:
          type: string
          enum: [website, referral, social_media, cold_call, email, other]
        notes:
          type: string
        address:
          type: string

    ContactResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        jobTitle:
          type: string
          nullable: true
        status:
          type: string
          enum: [lead, prospect, customer, inactive]
        source:
          type: string
          enum: [website, referral, social_media, cold_call, email, other]
        notes:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Widget Settings Schemas
    WidgetSettingsResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        welcomeMessage:
          type: string
        iconPath:
          type: string
          nullable: true
        primaryColor:
          type: string
        fontFamily:
          type: string
        sessionTimeout:
          type: integer
        isActive:
          type: boolean

    UpdateWidgetSettingsRequest:
      type: object
      properties:
        welcomeMessage:
          type: string
        iconPath:
          type: string
        primaryColor:
          type: string
        fontFamily:
          type: string
        sessionTimeout:
          type: integer
          minimum: 1
        isActive:
          type: boolean

    # Chatbot Settings Schemas
    ChatbotSettingsResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        systemInstruction:
          type: string
        modelName:
          type: string
        embeddingModel:
          type: string
        temperature:
          type: number
        maxTokens:
          type: integer
        topP:
          type: number
        topK:
          type: integer

    UpdateChatbotSettingsRequest:
      type: object
      properties:
        systemInstruction:
          type: string
        modelName:
          type: string
        embeddingModel:
          type: string
        temperature:
          type: number
          minimum: 0
          maximum: 2
        maxTokens:
          type: integer
          minimum: 1
        topP:
          type: number
          minimum: 0
          maximum: 1
        topK:
          type: integer
          minimum: 1

    # Form Field Schemas
    FormFieldResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fieldName:
          type: string
        label:
          type: string
        fieldType:
          type: string
          enum: [text, email, phone, number, textarea, select]
        placeholder:
          type: string
          nullable: true
        options:
          type: object
          nullable: true
        isRequired:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean

    CreateFormFieldRequest:
      type: object
      required: [fieldName, label, fieldType]
      properties:
        fieldName:
          type: string
          maxLength: 100
        label:
          type: string
          maxLength: 200
        fieldType:
          type: string
          enum: [text, email, phone, number, textarea, select]
        placeholder:
          type: string
          maxLength: 200
        options:
          type: object
        isRequired:
          type: boolean
          default: true
        sortOrder:
          type: integer
          default: 0

    UpdateFormFieldRequest:
      type: object
      properties:
        fieldName:
          type: string
          maxLength: 100
        label:
          type: string
          maxLength: 200
        fieldType:
          type: string
          enum: [text, email, phone, number, textarea, select]
        placeholder:
          type: string
          maxLength: 200
        options:
          type: object
        isRequired:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean

    ReorderFormFieldsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: string
                format: uuid
              sortOrder:
                type: integer

    # Session Schemas
    SessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionToken:
          type: string
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        values:
          type: object
          additionalProperties:
            type: string

    # Conversation Schemas
    ConversationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, ended]
        totalMessages:
          type: integer
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        totalTokens:
          type: integer
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true

    MessageResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        totalTokens:
          type: integer
        latencyMs:
          type: integer
          nullable: true
        modelName:
          type: string
          nullable: true

    # Knowledge Category Schemas
    KnowledgeCategoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
        isActive:
          type: boolean
        knowledgeBaseCount:
          type: integer

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        sortOrder:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        sortOrder:
          type: integer
        isActive:
          type: boolean

    # Knowledge Base Schemas
    KnowledgeBaseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        entryType:
          type: string
          enum: [faq, document_chunk]
        metadata:
          type: object
          nullable: true
        sortOrder:
          type: integer
        isActive:
          type: boolean

    CreateKnowledgeBaseRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        entryType:
          type: string
          enum: [faq, document_chunk]
          default: faq
        metadata:
          type: object
        sortOrder:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true

    UpdateKnowledgeBaseRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        entryType:
          type: string
          enum: [faq, document_chunk]
        metadata:
          type: object
        sortOrder:
          type: integer
        isActive:
          type: boolean

    BulkCreateKnowledgeBaseRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateKnowledgeBaseRequest'

    # Public Chat Schemas
    StartSessionRequest:
      type: object
      additionalProperties:
        type: string
      example:
        name: John
        email: john@example.com

    SendMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 5000

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        sources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              content:
                type: string
              distance:
                type: number
        conversationId:
          type: string
          format: uuid

    PublicConfigResponse:
      type: object
      properties:
        tenant:
          type: object
          properties:
            name:
              type: string
            logoPath:
              type: string
              nullable: true
        widget:
          $ref: '#/components/schemas/WidgetSettingsResponse'
        formFields:
          type: array
          items:
            $ref: '#/components/schemas/FormFieldResponse'

    # Playground Schemas
    PlaygroundRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 5000
        history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string

paths:
  # ==================== System ====================
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service is healthy

  # ==================== Auth ====================
  /api/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/UserResponse'
                          tokens:
                            $ref: '#/components/schemas/AuthTokens'
        '409':
          description: Email already registered
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      summary: Login with email and password
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/UserResponse'
                          tokens:
                            $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials

  /api/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid refresh token

  /api/auth/logout:
    post:
      summary: Logout (revoke refresh token)
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Logged out

  /api/auth/me:
    get:
      summary: Get current user profile
      tags: [Auth]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized

  # ==================== Tenants ====================
  /api/tenants:
    get:
      summary: List tenants for current user
      tags: [Tenants]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TenantResponse'

    post:
      summary: Create a new tenant
      tags: [Tenants]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TenantResponse'
        '422':
          description: Validation error

  /api/tenants/join:
    post:
      summary: Join a tenant by invite code
      tags: [Tenants]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinTenantRequest'
      responses:
        '200':
          description: Joined tenant successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TenantResponse'
        '404':
          description: Invalid invite code

  /api/tenants/accept-invite:
    post:
      summary: Accept a tenant invitation
      tags: [Tenants]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Invalid or expired invitation token

  /api/tenants/{id}:
    get:
      summary: Get tenant by ID
      tags: [Tenants]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TenantResponse'
        '404':
          description: Tenant not found

    put:
      summary: Update a tenant
      tags: [Tenants]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
